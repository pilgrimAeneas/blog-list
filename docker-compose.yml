name: app-prod
services:
  reverse-proxy:
    container_name: reverse-proxy
    image: nginx:1.29
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
    ports:
      - 8080:80
    depends_on:
      - frontend
      - server

  frontend:
    container_name: bloglist-frontend
    image: bloglist-frontend
    build:
      context: ./frontend
      dockerfile: Dockerfile

  server:
    container_name: bloglist-backend
    image: bloglist-backend
    build:
      context: ./backend
      dockerfile: Dockerfile